set-option -sa terminal-overrides ",xterm*:Tc"
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -sg escape-time 0
set -g focus-events on
set -g mouse on

# Prefix
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# Index from 1
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

# Pane splits (keep current path)
bind v split-window -h -c "#{pane_current_path}"
bind u split-window -v -c "#{pane_current_path}"

# New window (keep current path)
bind c new-window -c "#{pane_current_path}"

# Pane navigation (vim style, with prefix)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Pane navigation (without prefix)
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# Window switching (without prefix)
bind -n S-Left previous-window
bind -n S-Right next-window
bind -n M-H previous-window
bind -n M-L next-window

# Misc
set -g automatic-rename on
set -g automatic-rename-format "#{pane_current_command}"
bind s choose-session
bind r source-file ~/.tmux.conf
bind S command-prompt -p "New session name:" "new-session -s '%%'"
bind Y setw synchronize-panes

# Vi copy mode
setw -g mode-keys vi
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# Plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'catppuccin/tmux'
set -g @catppuccin_flavour 'mocha'
set -g status-right ''
set -g status-right-length 0

run '~/.tmux/plugins/tpm/tpm'
