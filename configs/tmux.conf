set -g mouse on

set-option -g prefix C-a
set -g base-index 1
set -g default-terminal "screen-256color"
set -g pane-base-index 1
bind C-a last-window
bind a send-prefix
bind v split-window -h
bind u split-window -v
bind s setw synchronize-panes
bind r source-file ~/.tmux.conf
bind c new-window -c "$HOME/dev"

set-option -g status on
set-option -g status-interval 2
set-option -g status-justify "left"
set-option -g status-left-length 60
set-option -g status-right-length 120

setw -g mode-keys vi
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
bind -Tcopy-mode-vi 'v' send -X begin-selection
bind -Tcopy-mode-vi 'y' send -X copy-selection

#-------------------------------------------------------#
# Pane colours
#-------------------------------------------------------#
set -g window-active-style 'fg=colour247,bg=colour236'
set -g window-style 'fg=colour250,bg=black'

#### COLOUR (Solarized Light)

# pane border
set -g pane-border-style "fg=white" #base2
set -g pane-active-border-style "fg=brightcyan" #base1

# default statusbar colors
set-option -g status-style "fg=black"

# default window title colors
set-window-option -g window-status-style "fg=brightyellow,bg=default" #base00

# active window title colors
set-window-option -g window-status-current-style "fg=brightred,bg=default" #orange

# message text
set-option -g message-style "fg=brightred,bg=white" #orange, base2

# pane number display
set-option -g display-panes-active-colour blue
set-option -g display-panes-colour brightred #orange

# clock
set-window-option -g clock-mode-colour green

# List of plugins
set -g @plugin 'tmux-plugins/tpm'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'

if-shell "test -f ~/.tmuxline_snapshot" "source ~/.tmuxline_snapshot"
