repos:
  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.11.0.1
    hooks:
      - id: shellcheck
        files: ^(configs/(aliases|bash_profile|zprofile|zshrc)|scripts/.*\.sh)$
        types: [file]
  - repo: local
    hooks:
      - id: codex-doctor
        name: codex doctor
        entry: codex doctor --summary --ascii
        language: system
        pass_filenames: false
        files: ^configs/codex/config\.toml$
