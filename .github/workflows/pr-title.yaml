## Reference: https://github.com/amannn/action-semantic-pull-request
---
name: "Lint PR Title"
on:
  pull_request_target:
    types: [opened, reopened, edited, synchronize]
permissions:
  contents: read
jobs:
  main:
    permissions:
      contents: read
      pull-requests: read
      statuses: write
    uses: github-community-projects/ospo-reusable-workflows/.github/workflows/pr-title.yaml@e92cb6053ace495fe40a5f185988557afcdcecbc # v1.0.1
    secrets:
      github-token: ${{ secrets.GITHUB_TOKEN }}
