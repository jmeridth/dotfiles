---
name: Auto Labeler
on:
  # pull_request_target event is required for autolabeler to support all PRs including forks
  pull_request_target:
    types: [opened, reopened, edited, synchronize]
permissions:
  contents: read
jobs:
  main:
    permissions:
      contents: write
      pull-requests: write
    uses: github-community-projects/ospo-reusable-workflows/.github/workflows/auto-labeler.yaml@e92cb6053ace495fe40a5f185988557afcdcecbc # v1.0.1
    with:
      config-name: release-drafter.yaml
    secrets:
      github-token: ${{ secrets.GITHUB_TOKEN }}
